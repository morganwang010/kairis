<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 烟花效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
    #info {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 16px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">点击屏幕发射烟花 🎆</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============================================
    // 场景初始化
    // ============================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000011); // 深蓝色夜空

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 50);
    camera.lookAt(0, 10, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ============================================
    // 工具函数
    // ============================================
    const randomRange = (min, max) => Math.random() * (max - min) + min;
    const randomColor = () => {
      const colors = [
        0xff0040, // 红
        0xff6600, // 橙
        0xffcc00, // 黄
        0x00ff66, // 绿
        0x00ffff, // 青
        0x0066ff, // 蓝
        0x9900ff, // 紫
        0xff00ff, // 粉
        0xff3399, // 荧光粉
        0x33ff99, // 荧光绿
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    };

    // ============================================
    // 火箭类
    // ============================================
    class Rocket {
      constructor(targetX, targetY) {
        this.targetX = targetX;
        this.targetY = targetY;
        this.startX = 0;
        this.startY = -25;
        this.progress = 0;
        this.speed = 0.02;
        this.exploded = false;

        // 创建火箭几何体
        const geometry = new THREE.SphereGeometry(0.3, 8, 8);
        const material = new THREE.MeshBasicMaterial({ 
          color: 0xffffff,
          transparent: true,
          opacity: 0.8
        });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.set(this.startX, this.startY, 0);
        scene.add(this.mesh);

        // 火箭尾迹
        this.trail = [];
        this.trailGeometry = new THREE.BufferGeometry();
        this.trailPositions = new Float32Array(50 * 3);
        this.trailGeometry.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
        const trailMaterial = new THREE.PointsMaterial({
          color: 0xffaa00,
          size: 0.2,
          transparent: true,
          opacity: 0.6,
          blending: THREE.AdditiveBlending
        });
        this.trailPoints = new THREE.Points(this.trailGeometry, trailMaterial);
        scene.add(this.trailPoints);
      }

      update() {
        if (this.exploded) return;

        this.progress += this.speed;
        
        // 线性插值计算当前位置
        const currentX = this.startX + (this.targetX - this.startX) * this.progress;
        const currentY = this.startY + (this.targetY - this.startY) * this.progress;
        
        this.mesh.position.set(currentX, currentY, 0);

        // 更新尾迹
        this.trail.push({ x: currentX, y: currentY });
        if (this.trail.length > 50) this.trail.shift();

        for (let i = 0; i < this.trail.length; i++) {
          this.trailPositions[i * 3] = this.trail[i].x;
          this.trailPositions[i * 3 + 1] = this.trail[i].y;
          this.trailPositions[i * 3 + 2] = 0;
        }
        this.trailGeometry.attributes.position.needsUpdate = true;

        // 到达目标位置，引爆
        if (this.progress >= 1) {
          this.explode();
        }
      }

      explode() {
        this.exploded = true;
        scene.remove(this.mesh);
        scene.remove(this.trailPoints);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
        this.trailGeometry.dispose();
        this.trailPoints.material.dispose();
        
        // 创建爆炸粒子
        createExplosion(this.targetX, this.targetY);
      }

      dispose() {
        if (!this.exploded) {
          scene.remove(this.mesh);
          scene.remove(this.trailPoints);
          this.mesh.geometry.dispose();
          this.mesh.material.dispose();
          this.trailGeometry.dispose();
          this.trailPoints.material.dispose();
        }
      }
    }

    // ============================================
    // 粒子类
    // ============================================
    class Particle {
      constructor(x, y, color) {
        this.position = new THREE.Vector3(x, y, 0);
        this.velocity = new THREE.Vector3(
          randomRange(-3, 3),
          randomRange(-3, 3),
          randomRange(-1, 1)
        );
        this.gravity = -0.05;
        this.friction = 0.98;
        this.life = 1.0;
        this.decay = randomRange(0.008, 0.015);
        this.color = color;

        // 创建粒子几何体
        const geometry = new THREE.SphereGeometry(0.08, 4, 4);
        const material = new THREE.MeshBasicMaterial({
          color: color,
          transparent: true,
          opacity: 1,
          blending: THREE.AdditiveBlending
        });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.copy(this.position);
        scene.add(this.mesh);
      }

      update() {
        // 应用物理效果
        this.velocity.y += this.gravity;
        this.velocity.multiplyScalar(this.friction);
        
        this.position.add(this.velocity);
        this.mesh.position.copy(this.position);
        
        this.life -= this.decay;
        this.mesh.material.opacity = Math.max(0, this.life);
        
        // 粒子缩小效果
        const scale = Math.max(0.1, this.life);
        this.mesh.scale.set(scale, scale, scale);

        return this.life > 0;
      }

      dispose() {
        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
    }

    // ============================================
    // 爆炸效果
    // ============================================
    let particles = [];

    function createExplosion(x, y) {
      const particleCount = Math.floor(randomRange(100, 150));
      const color = randomColor();
      
      for (let i = 0; i < particleCount; i++) {
        const particle = new Particle(x, y, color);
        particles.push(particle);
      }
    }

    // ============================================
    // 火箭管理
    // ============================================
    let rockets = [];

    // ============================================
    // 事件监听
    // ============================================
    window.addEventListener('mousedown', (event) => {
      if (event.button === 0) { // 左键点击
        // 将屏幕坐标转换为 Three.js 场景坐标
        const mouse = new THREE.Vector2(
          (event.clientX / window.innerWidth) * 2 - 1,
          -(event.clientY / window.innerHeight) * 2 + 1
        );

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        
        // 计算目标位置（简化为平面投影）
        const targetX = mouse.x * 25;
        const targetY = mouse.y * 25 + 10;

        const rocket = new Rocket(targetX, targetY);
        rockets.push(rocket);
      }
    });

    // 窗口大小自适应
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============================================
    // 渲染循环
    // ============================================
    function animate() {
      requestAnimationFrame(animate);

      // 更新火箭
      rockets = rockets.filter(rocket => {
        rocket.update();
        return !rocket.exploded;
      });

      // 更新粒子
      particles = particles.filter(particle => {
        const alive = particle.update();
        if (!alive) {
          particle.dispose();
        }
        return alive;
      });

      renderer.render(scene, camera);
    }

    // 启动渲染循环
    animate();

    // 3秒后隐藏提示信息
    setTimeout(() => {
      const info = document.getElementById('info');
      if (info) {
        info.style.transition = 'opacity 1s';
        info.style.opacity = '0';
        setTimeout(() => info.remove(), 1000);
      }
    }, 3000);
  </script>
</body>
</html>
